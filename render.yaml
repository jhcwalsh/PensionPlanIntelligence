services:
  - type: web
    name: pension-plan-intelligence
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: DOWNLOADS_DIR
        value: /data/downloads
      - key: APP_BASE_URL
        value: https://pensionplanintelligence.onrender.com

  # CIO Insights publishing automation (insights/ package).
  # Each cron job shares the persistent disk so the SQLite DB seen by
  # the web service is the same one the cycles update.
  #
  # Times below are UTC (Render cron is UTC); converted from
  # 02:00 ET / 09:00 ET assuming EDT (UTC-4). Adjust by one hour
  # during EST. See DECISIONS.md §2.

  - type: cron
    name: insights-weekly
    runtime: python
    buildCommand: pip install -r requirements.txt anthropic==0.42.0 tenacity==9.0.0
    schedule: "0 6 * * 0"        # Sun 02:00 ET → 06:00 UTC (EDT)
    # --skip-scrape: the fetch step uses Playwright + Chromium, which is
    # painful on Render's Native Python runtime. The DB is refreshed
    # locally via `python pipeline.py`; the cron only composes from it.
    # See README.md → "Running the pipeline" for the local workflow.
    command: python -m insights.scheduler weekly --skip-scrape
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: DOWNLOADS_DIR
        value: /data/downloads
      - key: APPROVAL_BASE_URL
        value: https://pensionplanintelligence.onrender.com
      - key: INSIGHTS_MODE
        value: live

  - type: cron
    name: insights-monthly
    runtime: python
    buildCommand: pip install -r requirements.txt anthropic==0.42.0 tenacity==9.0.0
    schedule: "0 6 1 * *"        # 1st of month 02:00 ET
    command: python -m insights.scheduler monthly
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: APPROVAL_BASE_URL
        value: https://pensionplanintelligence.onrender.com
      - key: INSIGHTS_MODE
        value: live

  - type: cron
    name: insights-annual
    runtime: python
    buildCommand: pip install -r requirements.txt anthropic==0.42.0 tenacity==9.0.0
    schedule: "0 6 5 1 *"        # Jan 5 02:00 ET
    command: python -m insights.scheduler annual
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: APPROVAL_BASE_URL
        value: https://pensionplanintelligence.onrender.com
      - key: INSIGHTS_MODE
        value: live

  - type: cron
    name: insights-reminders
    runtime: python
    buildCommand: pip install -r requirements.txt anthropic==0.42.0 tenacity==9.0.0
    schedule: "0 13 * * *"       # Daily 09:00 ET → 13:00 UTC (EDT)
    command: python -m insights.scheduler reminders
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: APPROVAL_BASE_URL
        value: https://pensionplanintelligence.onrender.com
      - key: INSIGHTS_MODE
        value: live

  # ---------------------------------------------------------------------------
  # RFP alerts pipeline (rfp/ package + api/ FastAPI service)
  # ---------------------------------------------------------------------------

  - type: web
    name: pension-rfp-api
    runtime: python
    buildCommand: pip install -r requirements-pipeline.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: DOWNLOADS_DIR
        value: /data/downloads
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://pensionplanintelligence.onrender.com
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO

  - type: cron
    name: pension-rfp-pipeline
    runtime: python
    schedule: "0 6,12,18,0 * * *"   # 6am, 12pm, 6pm, 12am UTC
    buildCommand: pip install -r requirements-pipeline.txt
    startCommand: python -m scripts.run_rfp_extraction
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: DOWNLOADS_DIR
        value: /data/downloads
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
