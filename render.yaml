services:
  - type: web
    name: pension-plan-intelligence
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: DOWNLOADS_DIR
        value: /data/downloads
