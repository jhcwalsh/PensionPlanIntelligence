services:
  # ---------------------------------------------------------------------------
  # Streamlit web app — primary public surface.
  # Owns the /data persistent disk (the SQLite DB lives there).
  # ---------------------------------------------------------------------------

  - type: web
    name: pension-plan-intelligence
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    disk:
      name: pension-db
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: DB_PATH
        value: /data/pension.db
      - key: DOWNLOADS_DIR
        value: /data/downloads
      - key: APP_BASE_URL
        value: https://pensionplanintelligence.onrender.com

  # ---------------------------------------------------------------------------
  # FastAPI read API for RFP records.
  # Reads from the git-tracked db/pension.db (no persistent disk needed —
  # the API is read-only; the pipeline that writes records runs locally).
  # ---------------------------------------------------------------------------

  - type: web
    name: pension-rfp-api
    runtime: python
    buildCommand: pip install -r requirements-pipeline.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://pensionplanintelligence.onrender.com
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO

# ---------------------------------------------------------------------------
# Cron services intentionally NOT deployed on Render.
#
# Render cron jobs cannot mount persistent disks, which means cron writes
# would be ephemeral and not visible to the web services. We run the
# equivalent work locally instead:
#
#   python pipeline.py                          # daily/weekly fetch + summarize
#   python refresh_cafrs.py                     # monthly CAFR refresh
#   python extract_cafr_investments.py          # extract investment data
#   python -m scripts.run_rfp_extraction        # RFP records
#   python -m insights.scheduler weekly --skip-scrape   # CIO Insights weekly
#   python -m insights.scheduler monthly                # CIO Insights monthly
#   python -m insights.scheduler annual                 # CIO Insights annual
#   python -m insights.scheduler reminders              # 72h reminders + 7d expiry
#
# After running, commit db/pension.db and push — Render redeploys
# automatically and the web services pick up the new state.
#
# See README.md "Running the pipeline (local, weekly)" for the full
# workflow, and the Windows Task Scheduler scripts in scripts/run_*.bat
# for automating the local schedule.
#
# Long-term: migrate db/pension.db → Render Postgres. Then crons can run
# on Render again because they'll connect via DATABASE_URL instead of
# needing a shared disk.
# ---------------------------------------------------------------------------
