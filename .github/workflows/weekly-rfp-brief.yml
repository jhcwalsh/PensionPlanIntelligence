name: Weekly RFP Brief

# Compose the weekly Consultant RFP newsletter (7-day this-week section
# plus a running 30-day rollup). Read-only against the documents corpus
# but writes notes/weekly_consultant_rfps_<period_end>.md.
#
# Runs Sundays at 12:00 UTC (~8:00 AM EDT / 7:00 AM EST), 30 minutes
# after weekly-rfp backfill (11:30 UTC) so this brief sees freshly
# extracted records, and 30 minutes after weekly-insights (11:00 UTC)
# to avoid pushing the same DB at the same time.

on:
  schedule:
    - cron: "0 12 * * 0"   # Sundays at 12:00 UTC = 8:00 AM EDT / 7:00 AM EST
  workflow_dispatch:
    inputs:
      period:
        description: "Sunday end-date as YYYY-MM-DD (default: most recent Sunday)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: weekly-rfp-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Verify ANTHROPIC_API_KEY is set
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repository secret is empty or unset."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is present (length: ${#KEY} chars)"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Compose weekly RFP brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.period }}" ]; then
            python -m scripts.compose_rfp_weekly --period "${{ github.event.inputs.period }}"
          else
            python -m scripts.compose_rfp_weekly
          fi

      - name: Commit brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notes/weekly_consultant_rfps_*.md
          if git diff --staged --quiet; then
            echo "No new brief to commit."
          else
            git commit -m "Weekly RFP brief $(date -u +%Y-%m-%d) [GHA]"
            git push
          fi
