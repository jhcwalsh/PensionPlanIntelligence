name: Weekly RFP Brief

# Compose the weekly Consultant RFP newsletter (7-day this-week section
# plus a running 30-day rollup). Read-only against the documents corpus
# but writes notes/weekly_consultant_rfps_<period_end>.md.
#
# Runs Sundays at 13:00 UTC (~9:00 AM EDT / 8:00 AM EST), the last leg
# of the Sunday cascade:
#   11:00 daily-pipeline → 12:00 weekly-rfp → 12:30 weekly-insights →
#   13:00 weekly-rfp-brief.
# Each stage gets 30 min margin from the previous, and this brief sees
# freshly extracted records committed by weekly-rfp.

on:
  schedule:
    - cron: "0 13 * * 0"   # Sundays at 13:00 UTC = 9:00 AM EDT / 8:00 AM EST
  workflow_dispatch:
    inputs:
      period:
        description: "Sunday end-date as YYYY-MM-DD (default: most recent Sunday)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: weekly-rfp-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Verify ANTHROPIC_API_KEY is set
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repository secret is empty or unset."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is present (length: ${#KEY} chars)"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Compose weekly RFP brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.period }}" ]; then
            python -m scripts.compose_rfp_weekly --period "${{ github.event.inputs.period }}"
          else
            python -m scripts.compose_rfp_weekly
          fi

      - name: Commit brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notes/weekly_consultant_rfps_*.md
          if git diff --staged --quiet; then
            echo "No new brief to commit."
          else
            git commit -m "Weekly RFP brief $(date -u +%Y-%m-%d) [GHA]"
            if ! git push; then
              echo "Push rejected; rebasing on origin/master and retrying."
              git fetch origin master
              if ! git rebase origin/master; then
                echo "::error::Rebase conflict during push retry; aborting."
                git rebase --abort
                exit 1
              fi
              git push
            fi
          fi
