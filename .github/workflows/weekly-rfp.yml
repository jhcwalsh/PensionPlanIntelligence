name: Weekly RFP backfill (GHA edition)

# Bounded RFP-record extraction over the existing document corpus.
# Pure DB + LLM work — no Playwright, uses already-fetched documents.
# Idempotent on (document_id, prompt_version), so re-runs are no-ops
# until new documents arrive.
#
# Runs Sundays at 11:30 UTC (~7:30 AM EDT / 6:30 AM EST), 30 minutes
# after weekly-insights to avoid pushing the same DB at the same time.
# Replaces the local Task Scheduler entry in scripts/run_weekly.bat.

on:
  schedule:
    - cron: "30 11 * * 0"   # Sundays at 11:30 UTC = 7:30 AM EDT / 6:30 AM EST
  workflow_dispatch:
    inputs:
      limit:
        description: "Max documents to process this run (CLAUDE.md notes ~$3/week at 100)"
        required: false
        default: "100"
      dry_run:
        description: "Skip the final commit/push of db/pension.db"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: weekly-rfp
  cancel-in-progress: false

jobs:
  rfp:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Verify ANTHROPIC_API_KEY is set
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repository secret is empty or unset."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is present (length: ${#KEY} chars)"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Run RFP extraction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scripts.run_rfp_extraction --limit ${{ github.event.inputs.limit || '100' }}

      - name: Commit DB changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/pension.db
          if git diff --staged --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "Weekly RFP backfill $(date -u +%Y-%m-%d) [GHA]"
            git push
          fi
