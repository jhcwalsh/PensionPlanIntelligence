name: nightly-eval

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      LLM_MODE: mock
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Run eval
        run: python -m scripts.run_eval --update-baseline

      - name: Open PR if baseline changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh eval_baseline.json"
          branch: chore/eval-baseline-refresh
          title: "Refresh eval_baseline.json"
          body: "Auto-generated by .github/workflows/nightly_eval.yml"
          add-paths: |
            fixtures/eval_baseline.json
