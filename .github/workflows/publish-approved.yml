name: publish-approved

# Runs the publish step for an approved (or awaiting_approval) publication
# from inside GitHub Actions, which has a proper origin remote — unlike
# Render's Streamlit container. Invoke manually with a publication id.

on:
  workflow_dispatch:
    inputs:
      publication_id:
        description: "Publication id to publish (look up in the Drafts tab)"
        required: true
        type: number

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      # mock mode skips publish.py's internal git push — this workflow
      # does its own commit/push below so the DB state changes are
      # included in the same commit as the notes file.
      INSIGHTS_MODE: mock

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Pull DB from R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m scripts.db_sync pull

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish publication
        run: python -m scripts.publish_pending --id "${{ inputs.publication_id }}"

      - name: Push DB to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m scripts.db_sync push --by "${{ github.workflow }}"

      - name: Commit notes + DB
        run: |
          git add notes/ db/pension.db
          if git diff --cached --quiet; then
            echo "No changes to commit (already published?)."
          else
            git commit -m "Publish publication ${{ inputs.publication_id }} via GHA"
            if ! git push; then
              echo "Push rejected; rebasing on origin/master and retrying."
              git fetch origin master
              if ! git rebase origin/master; then
                echo "::error::Rebase conflict during push retry; aborting."
                git rebase --abort
                exit 1
              fi
              git push
            fi
          fi
