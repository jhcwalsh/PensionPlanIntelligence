name: Pipeline scrape probe

# Manually-triggered probe to verify GitHub Actions runners can reach the
# pension-plan board-materials sites without being blocked by cloud-IP-aware
# bot mitigation. Run this BEFORE migrating the production daily pipeline
# from local Task Scheduler to GHA cron — see scripts/probe_scrape.py.

on:
  workflow_dispatch:
    inputs:
      plan_ids:
        description: "Comma- or space-separated plan IDs (blank = default 17-plan sample, '--all' = every plan)"
        required: false
        default: ""
      cafr:
        description: "Probe CAFR PDF URLs instead of materials_url (skips plans without CAFR fields)"
        required: false
        type: boolean
        default: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Install Playwright Chromium with system deps
        # CAFR probe is requests-only — no need for Chromium.
        if: ${{ github.event.inputs.cafr != 'true' }}
        run: python -m playwright install --with-deps chromium

      - name: Run probe
        run: |
          CAFR_FLAG=""
          if [ "${{ github.event.inputs.cafr }}" = "true" ]; then
            CAFR_FLAG="--cafr"
          fi
          # Pass any user-supplied plan_ids verbatim so '--all' works too.
          python -m scripts.probe_scrape $CAFR_FLAG ${{ github.event.inputs.plan_ids }}
