name: Weekly insights (GHA edition)

# Composes the weekly Insights digest and sends the approve/reject
# magic-link email to APPROVAL_EMAIL_RECIPIENT. Pure composition --
# uses documents already in the DB (--skip-scrape). Pushes the resulting
# db/pension.db + notes/ so the production Streamlit can resolve the
# token when the user clicks the magic link.
#
# Runs Sundays at 12:30 UTC (~8:30 AM EDT / 7:30 AM EST), staggered
# after daily-pipeline (11:00 UTC) and weekly-rfp (12:00 UTC) so the
# digest sees today's fresh summaries and RFP records.

on:
  schedule:
    - cron: "30 12 * * 0"  # Sundays at 12:30 UTC = 8:30 AM EDT / 7:30 AM EST
  workflow_dispatch:
    inputs:
      period:
        description: "Week start (Sunday) in YYYY-MM-DD. Blank = auto-pick most recently ended week."
        required: false
        default: ""
      force:
        description: "Re-compose + re-send even if a publication exists for this period."
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Skip the final commit/push of db/pension.db + notes/"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: weekly-insights
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Verify required secrets are set
        env:
          ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND: ${{ secrets.RESEND_API_KEY }}
        run: |
          missing=()
          [ -z "$ANTHROPIC" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "$RESEND" ] && missing+=("RESEND_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository secret(s): ${missing[*]}"
            echo "Fix: Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Compose weekly insights + send approval email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APPROVAL_EMAIL_RECIPIENT: ${{ secrets.APPROVAL_EMAIL_RECIPIENT }}
          APPROVAL_EMAIL_FROM: ${{ secrets.APPROVAL_EMAIL_FROM }}
          INSIGHTS_MODE: live
        run: |
          ARGS="--skip-scrape"
          if [ -n "${{ github.event.inputs.period }}" ]; then
            ARGS="$ARGS --period ${{ github.event.inputs.period }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python -m insights.scheduler weekly $ARGS

      # Skip only when the manual dispatch explicitly checks "dry_run".
      # Scheduled runs have no inputs, so this fires for cron and for
      # unchecked manual runs.
      - name: Commit DB + notes changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/pension.db notes/
          if git diff --staged --quiet; then
            echo "No DB/notes changes to commit."
          else
            git commit -m "Weekly insights $(date -u +%Y-%m-%d) [GHA]"
            if ! git push; then
              echo "Push rejected; rebasing on origin/master and retrying."
              git fetch origin master
              if ! git rebase origin/master; then
                echo "::error::Rebase conflict during push retry; aborting."
                git rebase --abort
                exit 1
              fi
              git push
            fi
          fi
