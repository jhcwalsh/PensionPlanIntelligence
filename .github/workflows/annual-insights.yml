name: Annual insights (GHA edition)

# Composes the year-in-review CIO Insight digest and sends the
# approve/reject magic-link email. Pure composition — uses approved
# monthly publications already in the DB. No Playwright, no scrape.
#
# Runs Jan 5 at 19:00 UTC — a few days after monthly-insights and
# quarterly-insights (both Jan 1) so December's monthly and the Q4
# quarterly can be approved before the annual synthesizes the year.
#
# Partial years are fine: 2026 production starts in April, so the
# first run (Jan 2027, targeting 2026) synthesizes 9 monthlies.

on:
  schedule:
    - cron: "0 19 5 1 *"   # Jan 5 at 19:00 UTC
  workflow_dispatch:
    inputs:
      year:
        description: "Override target year (default: prior calendar year)"
        required: false
        default: ""
      dry_run:
        description: "Skip the final commit/push of db/pension.db + notes/"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: annual-insights
  cancel-in-progress: false

jobs:
  annual:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Verify required secrets are set
        env:
          ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND: ${{ secrets.RESEND_API_KEY }}
        run: |
          missing=()
          [ -z "$ANTHROPIC" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "$RESEND" ] && missing+=("RESEND_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository secret(s): ${missing[*]}"
            echo "Fix: Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Pull DB from R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m scripts.db_sync pull

      - name: Compose annual insights + send approval email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APPROVAL_EMAIL_RECIPIENT: ${{ secrets.APPROVAL_EMAIL_RECIPIENT }}
          APPROVAL_EMAIL_FROM: ${{ secrets.APPROVAL_EMAIL_FROM }}
          INSIGHTS_MODE: live
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            python -m insights.scheduler annual --year ${{ github.event.inputs.year }}
          else
            python -m insights.scheduler annual
          fi

      - name: Push DB to R2
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m scripts.db_sync push --by "${{ github.workflow }}"

      - name: Commit DB + notes changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/pension.db notes/
          if git diff --staged --quiet; then
            echo "No DB/notes changes to commit."
          else
            git commit -m "Annual insights $(date -u +%Y-%m-%d) [GHA]"
            git push
          fi
