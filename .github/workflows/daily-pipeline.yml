name: Daily pipeline (GHA edition)

# Manually-triggered fetch + extract + summarize for the GHA-eligible
# plans (137 of 148; the WAF-blocked 11 stay on local Task Scheduler --
# see data/local_only_plans.json). No cron schedule yet -- wire that in
# once we've watched a few manual runs succeed end-to-end.
#
# Default behavior: dry_run=true, so this runs the full pipeline but
# skips the final `git commit && git push` of db/pension.db. Flip
# dry_run=false to exercise the real flow (which is what enables the
# Render redeploy after a successful run).

on:
  workflow_dispatch:
    inputs:
      plan_ids:
        description: "Optional plan IDs (space-separated). Blank = all GHA-eligible plans."
        required: false
        default: ""
      dry_run:
        description: "Skip the final commit/push of db/pension.db"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Install Playwright Chromium with system deps
        run: python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py ${{ github.event.inputs.plan_ids }}

      - name: Pipeline status
        run: python pipeline.py --status

      - name: Commit DB changes
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/pension.db
          if git diff --staged --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "Pipeline run $(date -u +%Y-%m-%d) [GHA]"
            git push
          fi
