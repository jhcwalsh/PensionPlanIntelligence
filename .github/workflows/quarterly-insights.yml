name: Quarterly insights (GHA edition)

# Composes a quarter-in-review CIO Insight digest and sends the
# approve/reject magic-link email. Pure composition — uses approved
# monthly publications already in the DB. No Playwright, no scrape.
#
# Runs the 1st of Jan/Apr/Jul/Oct at 19:00 UTC (~3 PM EDT / 2 PM EST).
# Staggered 1 hour after monthly-insights (which fires the same days
# at 18:00 UTC) so the two workflows don't push the DB simultaneously.
#
# Uses the 'quarterly' scheduler verb (insights/quarterly.py), which
# synthesizes the approved monthlies of the quarter that just ended —
# it works from the first quarter with approved monthlies instead of
# requiring a full prior calendar year like 'annual'.

on:
  schedule:
    - cron: "0 19 1 1,4,7,10 *"   # 1st of Jan/Apr/Jul/Oct at 19:00 UTC
  workflow_dispatch:
    inputs:
      period:
        description: "Override target quarter — any month in it as YYYY-MM (default: quarter just ended)"
        required: false
        default: ""
      dry_run:
        description: "Skip the final commit/push of db/pension.db + notes/"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: quarterly-insights
  cancel-in-progress: false

jobs:
  quarterly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Verify required secrets are set
        env:
          ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND: ${{ secrets.RESEND_API_KEY }}
        run: |
          missing=()
          [ -z "$ANTHROPIC" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "$RESEND" ] && missing+=("RESEND_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Compose quarterly insights + send approval email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APPROVAL_EMAIL_RECIPIENT: ${{ secrets.APPROVAL_EMAIL_RECIPIENT }}
          APPROVAL_EMAIL_FROM: ${{ secrets.APPROVAL_EMAIL_FROM }}
          INSIGHTS_MODE: live
        run: |
          if [ -n "${{ github.event.inputs.period }}" ]; then
            python -m insights.scheduler quarterly --period ${{ github.event.inputs.period }}
          else
            python -m insights.scheduler quarterly
          fi

      - name: Commit DB + notes changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/pension.db notes/
          if git diff --staged --quiet; then
            echo "No DB/notes changes to commit."
          else
            git commit -m "Quarterly insights $(date -u +%Y-%m-%d) [GHA]"
            git push
          fi
