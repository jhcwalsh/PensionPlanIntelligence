name: daily-digest

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC daily — ~9am ET (EST) / 8am ET (EDT)
  workflow_dispatch:
    inputs:
      mode:
        description: "INSIGHTS_MODE (mock for dry-run, live for real send)"
        required: false
        default: "live"
        type: choice
        options:
          - live
          - mock

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      INSIGHTS_MODE: ${{ github.event.inputs.mode || 'live' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      APPROVAL_EMAIL_FROM: ${{ secrets.APPROVAL_EMAIL_FROM }}
      APPROVAL_EMAIL_RECIPIENT: ${{ secrets.APPROVAL_EMAIL_RECIPIENT }}
      APPROVAL_BASE_URL: https://pensionplanintelligence.onrender.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Pull DB from R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m scripts.db_sync pull

      - name: Verify required secrets are set
        run: |
          missing=()
          [ -z "$ANTHROPIC_API_KEY" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "$RESEND_API_KEY" ] && missing+=("RESEND_API_KEY")
          [ -z "$APPROVAL_EMAIL_FROM" ] && missing+=("APPROVAL_EMAIL_FROM")
          [ -z "$APPROVAL_EMAIL_RECIPIENT" ] && missing+=("APPROVAL_EMAIL_RECIPIENT")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            echo "Set them in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required secrets present."

      - name: Send daily digest
        run: python -m insights.scheduler daily

      - name: Push DB to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m scripts.db_sync push --by ${{ github.workflow }}

      - name: Commit daily_runs update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/pension.db
          if git diff --cached --quiet; then
            echo "No DB changes — nothing to commit."
          else
            git commit -m "Daily digest run $(date -u +%F)"
            if ! git push; then
              echo "Push rejected; rebasing on origin/master and retrying."
              git fetch origin master
              if ! git rebase origin/master; then
                echo "::error::Rebase conflict during push retry; aborting."
                git rebase --abort
                exit 1
              fi
              git push
            fi
          fi
